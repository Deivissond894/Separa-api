<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Separação de Pedidos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="logo-flutuante.png">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#f2f4f7}

/* TOPO */
.topo{background:#0B2E5F;text-align:center;padding:15px}
.topo img{max-width:220px}

/* CONTAINER NORMAL */
.container{
  max-width:600px;
  margin:30px auto;
  background:#fff;
  padding:20px;
  border-radius:8px;
}

input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  font-size:15px;
  border-radius:6px;
}
input{border:1px solid #ccc}
button{border:none;cursor:pointer}

.btn-relatorio{background:#1F4E8C;color:#fff}
.btn-limpar{background:#C0392B;color:#fff}
.btn-andar{background:#6C3483;color:#fff}
.btn-limpar-hist{background:#C0392B;color:#fff;margin-top:10px}
.btn-ranked{background:#0B5F2E;color:#fff}

/* REFERÊNCIA OPERADORES */
.operadores-ref{
  margin-bottom:12px;
  padding:12px;
  background:#f0f2f5;
  border-radius:6px;
  font-size:14px;
}
.operadores-ref strong{
  display:block;
  margin-bottom:6px;
  color:#0B2E5F;
}
.operadores-ref div{line-height:1.5}

/* 🔎 PESQUISA FIXA NA LATERAL DIREITA */
.pesquisa-wrap{
  position:fixed;
  top:140px;
  right:20px;
  width:260px;
  z-index:1500;
}

/* CARDS */
.cards{margin-top:20px}
.card{
  padding:12px 16px;
  border-radius:6px;
  margin-top:12px;
  font-size:14px;
  background:linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
  border-left:4px solid rgba(255,255,255,0.3);
  display:grid;
  grid-template-columns:1fr auto;
  grid-template-rows:auto auto;
  gap:8px 12px;
  align-items:start;
}
.separacao{background:#FFD200;color:#333}
.confirmado{background:#008000;color:#fff}
.histórico{background:#A9A9A9;color:#fff}

.card-header{
  grid-column:1;
  font-weight:bold;
  font-size:16px;
}

.card-details{
  grid-column:1;
  grid-row:2;
  display:flex;
  flex-direction:column;
  gap:4px;
}

.timer{margin-top:6px;font-weight:bold}
.info-operador{font-size:13px;opacity:0.85}
.status-text{font-weight:bold;margin-top:4px}

/* BOTÕES DO CARD */
.card-actions{
  grid-column:2;
  grid-row:1/3;
  display:flex;
  gap:6px;
  align-self:center;
}

.btn-action{
  width:36px;
  height:36px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all 0.2s;
  flex-shrink:0;
}

.btn-delete{
  background:#C0392B;
  color:#fff;
}

.btn-delete:hover{
  background:#A93226;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
}

.btn-alert{
  background:#E67E22;
  color:#fff;
}

.btn-alert:hover{
  background:#D35400;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
}

/* BOTÃO TV */
.btn-tv{
  position:fixed;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  width:42px;height:42px;
  border-radius:50%;
  background:#1F4E8C;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:3000;
}

/* ===== MODO TV ===== */
@keyframes gradientFlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.animated-gradient-bg {
  width: 100%;
  height: 100vh;
  background: linear-gradient(-45deg, #4b0082, #8a2be2, #d800ff, #0000ff);
  background-size: 400% 400%;
  animation: gradientFlow 15s ease-in-out infinite;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 1;
}

body.modo-tv{background:transparent;position:relative}
body.modo-tv::before{
  content:'';
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background: linear-gradient(-45deg, #4b0082, #8a2be2, #d800ff, #0000ff);
  background-size: 400% 400%;
  animation: gradientFlow 15s ease-in-out infinite;
  z-index:0;
}
body.modo-tv .topo{background:transparent;position:relative;z-index:1}
body.modo-tv .container > *:not(.cards),
body.modo-tv .info-operador,
body.modo-tv .card-buttons,
body.modo-tv .operadores-ref,
body.modo-tv .pesquisa-wrap{display:none}

body.modo-tv .container{
  max-width:100%;
  background:transparent;
  margin:0;
  padding:20px;
  position:relative;
  z-index:1;
}

/* GRID TV */
.tv-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:15px}
.tv-col{min-height:80vh}
.tv-title{
  color:#fff;
  font-size:2.5vw;
  font-weight:bold;
  margin-bottom:10px;
  text-align:center;
  grid-column:span 2;
}
body.modo-tv .card{
  padding:3vh;
  margin-top:2vh;
  border-radius:12px;
  font-size:4vw;
  text-align:center;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:10vh;
}
body.modo-tv .timer{display:none}
body.modo-tv .status-text{display:none}

/* MODAIS */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:2000;
}
.modal-content{
  background:#fff;
  width:90%;
  max-width:500px;
  max-height:80vh;
  overflow-y:auto;
  border-radius:8px;
  padding:20px;
}
.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.close{cursor:pointer;font-size:20px;font-weight:bold}

.historico-card{
  background:#e2e3e5;
  padding:12px;
  border-radius:6px;
  margin-top:10px;
}

.ranked-box{background:#f2f2f2;padding:10px;border-radius:6px;margin-top:10px;font-size:15px}

/* INDICADOR OPERADOR */
.operador-ativo{
  font-weight:bold;
  color:#1F4E8C;
  margin-top:6px;
  display:none;
}
</style>
</head>

<body>

<div class="topo">
  <img src="logo-topo.png">
</div>

<div class="container">

  <div class="operadores-ref">
    <strong>Referência de Operadores</strong>
    <div>1 - Jhonny</div>
    <div>2 - Jhonatas</div>
    <div>3 - Marcos</div>
    <div>4 - Renato</div>
    <div>5 - Samuel Oliveira</div>
    <div>6 - Samuel Bispo</div>
    <div>7 - Fabio</div>
    <div>8 - Ruan</div>
  </div>

  <input id="usuario" placeholder="Número do separador (Térreo)">

  <div id="op-ativo-n1" class="operador-ativo">
    Separador ativo: <span id="nome-n1"></span>
  </div>

  <input id="scanner" placeholder="Aguardando bipe..." disabled>

  <button class="btn-relatorio" onclick="abrirHistorico()">Ver relatório</button>
  <button class="btn-ranked" onclick="abrirRanked()">Ranking</button>
  <button class="btn-andar" onclick="abrirAndar()">Primeiro andar</button>
  <button class="btn-limpar" onclick="limparPedidos()">Limpar pedidos ativos</button>

  <div class="cards" id="cards"></div>
</div>

<div class="pesquisa-wrap">
  <input id="pesquisa" placeholder="Pesquisar pedido ativo">
</div>

<div class="btn-tv" onclick="toggleTV()">📺</div>

<!-- MODAL PRIMEIRO ANDAR -->
<div class="modal" id="modalAndar">
  <div class="modal-content">
    <div class="modal-header">
      <strong>Primeiro Andar</strong>
      <span class="close" onclick="fecharAndar()">✖</span>
    </div>
    <input id="usuario2" placeholder="Número do separador (1º andar)">
    <div id="op-ativo-n2" class="operador-ativo">
      Separador ativo (1º andar): <span id="nome-n2"></span>
    </div>
    <input id="scanner2" placeholder="Aguardando bipe..." disabled>
    <div id="card-andar2-container" style="margin-top: 20px;"></div>
  </div>
</div>

<!-- MODAL PEÇA NÃO ENCONTRADA -->
<div class="modal" id="modalNaoEncontrado">
  <div class="modal-content">
    <div class="modal-header">
      <strong>Material Não Encontrado</strong>
      <span class="close" onclick="fecharNaoEncontrado()">✖</span>
    </div>
    <input id="neoOperador" placeholder="Código do operador" type="number">
    <div id="neoNomeOperador" class="operador-ativo" style="display:none;"></div>
    <input id="neoPedido" placeholder="Código do pedido" disabled>
    <input id="neoPeca" placeholder="Código da peça">
    <textarea id="neoObservacao" placeholder="Observação (opcional)" style="width:100%;padding:8px;margin-top:10px;border-radius:6px;border:1px solid #ccc;"></textarea>
    <button onclick="salvarNaoEncontrado()" style="width:100%;padding:12px;margin-top:10px;background:#E67E22;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;">Salvar</button>
  </div>
</div>

<!-- MODAL HISTÓRICO -->
<div class="modal" id="modalHistorico">
  <div class="modal-content">
    <div class="modal-header">
      <strong>Relatório</strong>
      <span class="close" onclick="fecharHistorico()">✖</span>
    </div>
    <input id="pesquisaHistorico" placeholder="Pesquisar no relatório">
    <div id="listaHistorico"></div>
    <button class="btn-limpar-hist" onclick="limparRelatorio()">Limpar relatório</button>
  </div>
</div>

<!-- MODAL RANKING -->
<div class="modal" id="modalRanked">
  <div class="modal-content">
    <div class="modal-header">
      <strong>Ranking Mensal Automático</strong>
      <span class="close" onclick="fecharRanked()">✖</span>
    </div>
    <div id="rankedAtual"></div>
    <div id="rankedHistorico"></div>
    <button class="btn-limpar-hist" onclick="limparRanked()">Zerar ranking</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, collection, getDocs, onSnapshot, doc, setDoc, deleteDoc, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAxl_UboOnSPX0uN5-5rXb0T9BWo506yc0",
  authDomain: "separacao-51e82.firebaseapp.com",
  projectId: "separacao-51e82",
  storageBucket: "separacao-51e82.firebasestorage.app",
  messagingSenderId: "43379104986",
  appId: "1:43379104986:web:dc97b02ef8a61fe2e619e3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Login anônimo
signInAnonymously(auth).catch(err => console.error("Auth error:", err));

// URL base da API
const API_URL = window.location.origin;

const usuarios = {
  1: "Jhonny", 2: "Jhonatas", 3: "Marcos", 4: "Renato",
  5: "Samuel Oliveira", 6: "Samuel Bispo", 7: "Fabio", 8: "Ruan"
};

const SENHA = "1617";

let pedidos = {};
let relatorio = [];
let ranked = { n1: {}, n2: {} };
let historicoRanked = [];

let operadorAtual = null;
let operador2 = null;
let pedidoSelecionadoNeo = null;

const usuario = document.getElementById("usuario");
const scanner = document.getElementById("scanner");
const usuario2 = document.getElementById("usuario2");
const scanner2 = document.getElementById("scanner2");
const cards = document.getElementById("cards");
const campoPesquisa = document.getElementById("pesquisa");
const campoPesquisaHistorico = document.getElementById("pesquisaHistorico");

const opBoxN1 = document.getElementById("op-ativo-n1");
const nomeN1 = document.getElementById("nome-n1");
const opBoxN2 = document.getElementById("op-ativo-n2");
const nomeN2 = document.getElementById("nome-n2");

// ===== INICIALIZAR LISTENERS DO FIRESTORE =====
onSnapshot(collection(db, "pedidosAtivos"), (snapshot) => {
  pedidos = {};
  snapshot.forEach(doc => {
    pedidos[doc.id] = doc.data();
  });
  render();
});

onSnapshot(query(collection(db, "relatorioPedidos"), orderBy("data", "desc")), (snapshot) => {
  relatorio = [];
  snapshot.forEach(doc => {
    relatorio.push(doc.data());
  });
});

// ===== LISTENERS RANKING =====
onSnapshot(doc(db, "ranking", "mesAtual"), (snapshot) => {
  if (snapshot.exists()) {
    ranked = snapshot.data();
    window.ranked = ranked;
    console.log("Ranking carregado:", ranked);
  } else {
    // Se não existir, cria documento vazio
    setDoc(doc(db, "ranking", "mesAtual"), { n1: {}, n2: {} })
      .then(() => {
        ranked = { n1: {}, n2: {} };
        window.ranked = ranked;
        console.log("Documento de ranking criado");
      })
      .catch(err => console.error("Erro ao criar documento:", err));
  }
}, (error) => {
  console.error("Erro no listener de ranking:", error);
});

onSnapshot(collection(db, "historicoRanking"), (snapshot) => {
  historicoRanked = [];
  snapshot.forEach(doc => {
    historicoRanked.push(doc.data());
  });
  window.historicoRanked = historicoRanked;
});

// PESQUISAS
campoPesquisa.addEventListener("input", render);
campoPesquisaHistorico.addEventListener("input", renderHistorico);

// ===== FOCO AUTOMÁTICO =====
// Focar no campo de usuário ao carregar a página
window.addEventListener("load", () => {
  usuario.focus();
});

// ===== TÉRREO =====
usuario.addEventListener("input", () => {
  const nome = usuarios[usuario.value];
  if (nome) {
    operadorAtual = nome;
    nomeN1.innerText = nome;
    opBoxN1.style.display = "block";
    usuario.value = "";
    scanner.disabled = false;
    scanner.focus();
  }
});

scanner.addEventListener("keydown", async (e) => {
  if (e.key === "Enter") {
    const c = scanner.value.trim();
    scanner.value = "";
    if (!c || !operadorAtual) return;

    playSound();
    const agora = Date.now();
    
    // Se o pedido estava em "não encontrado", cancela o timer e volta para amarelo
    if (pedidos[c] && pedidos[c].naoEncontradoEm && pedidos[c].tempoDesapareceNaoEncontrado) {
      console.log(`Pedido ${c} estava não encontrado, voltando para separação...`);
      
      // Cancelar timer de não encontrado
      if (pedidoTimeoutsNaoEncontrado[c]) {
        clearTimeout(pedidoTimeoutsNaoEncontrado[c]);
        delete pedidoTimeoutsNaoEncontrado[c];
      }
      
      // Limpar os campos de não encontrado no Firebase
      await setDoc(doc(db, "pedidosAtivos", c), {
        naoEncontradoEm: null,
        tempoDesapareceNaoEncontrado: null,
        codigoPecaNaoEncontrado: null,
        status: "separacao",
        oculto: false
      }, { merge: true });
    }
    
    if (!pedidos[c]) {
      // 1º bip: começa em "separacao"
      // Se pedido estava oculto (não encontrado), remover flag oculto para nova separação
      await setDoc(doc(db, "pedidosAtivos", c), {
        status: "separacao",
        iniciou: operadorAtual,
        separadores: [operadorAtual],
        oculto: false  // Reaparecerá em amarelo para nova separação
      });
      await addDoc(collection(db, "relatorioPedidos"), {
        pedido: c,
        tipo: "n1",
        operador: operadorAtual,
        data: agora
      });
    } else {
      // 2º bip: muda para "confirmado"
      const statusAtual = pedidos[c].status;
      const separadoresAtuais = pedidos[c].separadores || [];
      const iniciouAtual = pedidos[c].iniciou;
      
      if (statusAtual === "separacao") {
        // separacao → confirmado - USAR SERVIDOR COMO FONTE DA VERDADE
        try {
          const response = await fetch(`${API_URL}/api/pedidos/${c}/confirmar`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({})
          });
          const data = await response.json();
          const tempoExpiracao = data.tempoExpiracao;
          const agoraServidor = data.agora;
          
          console.log(`Pedido ${c} confirmado. Expira em: ${new Date(tempoExpiracao)}`);
          
          // Atualizar o objeto local ANTES de salvar no Firebase
          // para garantir consistência de dados
          if (!pedidos[c]) pedidos[c] = {};
          pedidos[c].tempoExpiracao = tempoExpiracao;
          pedidos[c].status = "confirmado";
          pedidos[c].oculto = false;
          
          const updateData = {
            status: "confirmado",
            finalizou: operadorAtual,
            separadores: [...separadoresAtuais, operadorAtual],
            tempoExpiracao: tempoExpiracao,
            oculto: false  // Garantir que não está oculto
          };
          
          // Apenas adicionar iniciou se existir
          if (iniciouAtual && iniciouAtual !== "undefined" && iniciouAtual !== "null") {
            updateData.iniciou = iniciouAtual;
          }
          
          await setDoc(doc(db, "pedidosAtivos", c), updateData, { merge: true });
          
          // Agenda remoção do pedido após 10 minutos usando timestamp do servidor
          // para evitar discrepâncias de fuso horário
          agendarRemocaoPedido(c, tempoExpiracao, agoraServidor);
        } catch (err) {
          console.error("Erro ao confirmar pedido:", err);
          return;
        }
        
        // Adiciona pontuação (apenas se operador válido)
        const iniciouOp = pedidos[c].iniciou;
        if (iniciouOp && iniciouOp !== "undefined" && iniciouOp !== "null") {
          ranked.n1[iniciouOp] = (ranked.n1[iniciouOp] || 0) + 1;
        }
        if (operadorAtual && operadorAtual !== "undefined" && operadorAtual !== "null" && iniciouOp !== operadorAtual) {
          ranked.n1[operadorAtual] = (ranked.n1[operadorAtual] || 0) + 1;
        }
        await salvarRanking();
      } else if (statusAtual === "confirmado") {
        // confirmado → separacao (volta) - muda o "iniciou" para o operador atual
        await setDoc(doc(db, "pedidosAtivos", c), {
          status: "separacao",
          finalizou: null,
          iniciou: operadorAtual,
          separadores: [...separadoresAtuais, operadorAtual]
        }, { merge: true });
        
        // NÃO registra novo evento - mantém só o 2º evento
      }
      
      if (statusAtual !== "confirmado") {
        await addDoc(collection(db, "relatorioPedidos"), {
          pedido: c,
          tipo: "n1",
          operador: operadorAtual,
          data: agora
        });
      }
    }

    operadorAtual = null;
    opBoxN1.style.display = "none";
    scanner.disabled = true;
    usuario.focus(); // Retorna foco para o campo de usuário
  }
});

// ===== PRIMEIRO ANDAR =====
function abrirAndar() {
  document.getElementById("modalAndar").style.display = "flex";
  usuario2.focus(); // Focar no campo de usuário quando abre a modal
}
function fecharAndar() {
  document.getElementById("modalAndar").style.display = "none";
}

// ===== EVENT LISTENER OPERADOR (Modal Não Encontrado) =====
document.addEventListener("input", (e) => {
  if (e.target.id === "neoOperador") {
    const codigo = e.target.value.trim();
    const nomeDiv = document.getElementById("neoNomeOperador");
    const pecaInput = document.getElementById("neoPeca");
    
    if (codigo && usuarios[codigo]) {
      nomeDiv.innerHTML = `Operador: <span style="color:#0B2E5F;font-weight:bold;">${usuarios[codigo]}</span>`;
      nomeDiv.style.display = "block";
      // Mover cursor para campo de peça
      pecaInput.focus();
    } else if (codigo) {
      nomeDiv.innerHTML = `<span style="color:#C0392B;">Operador não encontrado</span>`;
      nomeDiv.style.display = "block";
    } else {
      nomeDiv.style.display = "none";
    }
  }
});

// ===== MODAL NÃO ENCONTRADO =====
window.abrirNaoEncontrado = function(pedido) {
  console.log("Abrindo modal para pedido:", pedido);
  pedidoSelecionadoNeo = pedido;
  document.getElementById("neoPedido").value = pedido;
  document.getElementById("neoOperador").value = "";
  document.getElementById("neoPeca").value = "";
  document.getElementById("neoObservacao").value = "";
  document.getElementById("neoNomeOperador").innerHTML = "";
  const modal = document.getElementById("modalNaoEncontrado");
  console.log("Modal encontrado:", modal);
  modal.style.display = "flex";
  console.log("Display após mudança:", modal.style.display);
  document.getElementById("neoOperador").focus();
}

function fecharNaoEncontrado() {
  document.getElementById("modalNaoEncontrado").style.display = "none";
  pedidoSelecionadoNeo = null;
}

window.salvarNaoEncontrado = async function() {
  const operador = document.getElementById("neoOperador").value.trim();
  const peca = document.getElementById("neoPeca").value.trim();
  const observacao = document.getElementById("neoObservacao").value.trim();
  
  if (!operador || !peca || !pedidoSelecionadoNeo) {
    alert("Preencha operador e código da peça!");
    return;
  }
  
  try {
    const agora = Date.now();
    const tempoDesaparece = agora + (5 * 60 * 1000); // 5 minutos
    
    // Salvar documento em pedidosNaoEncontrados
    await addDoc(collection(db, "pedidosNaoEncontrados"), {
      pedido: pedidoSelecionadoNeo,
      codigoPeca: peca,
      operador: operador,
      nomeOperador: usuarios[operador] || "Desconhecido",
      observacao: observacao || "",
      data: agora,
      resolvido: false
    });
    
    // Marcar pedido como não encontrado no Firebase (persiste após recarregar)
    await setDoc(doc(db, "pedidosAtivos", pedidoSelecionadoNeo), {
      naoEncontradoEm: agora,
      tempoDesapareceNaoEncontrado: tempoDesaparece,
      codigoPecaNaoEncontrado: peca
    }, { merge: true });
    
    // Agendar remoção após 5 minutos (em qualquer modo)
    agendarRemocaoPedidoNaoEncontrado(pedidoSelecionadoNeo, tempoDesaparece, agora);

function render() {

  if (modoTV) window.scrollTo({ top: 0, behavior: "auto" });

  const agora = Date.now();
  
  // Se houver filtro, buscar também no histórico de hoje
  let pedidosFiltrados = Object.entries(pedidos);
  
  if (filtro) {
    // Filtrar pedidos ativos
    pedidosFiltrados = pedidosFiltrados.filter(([c]) => c.includes(filtro));
    
    // Adicionar pedidos do histórico de hoje que correspondem ao filtro
    const hoje = new Date(agora).toDateString();
    relatorio.forEach(item => {
      const dataItem = new Date(item.data).toDateString();
      if (dataItem === hoje && item.pedido && item.pedido.includes(filtro)) {
        // Verificar se já existe nos pedidos ativos
        if (!pedidosFiltrados.find(([c]) => c === item.pedido)) {
          // Adicionar como "histórico" (não está mais ativo)
          pedidosFiltrados.push([item.pedido, { 
            status: "histórico",
            tipo: item.tipo,
            operador: item.operador
          }]);
        }
      }
    });
  } else {
    // Sem filtro, mostrar apenas pedidos ativos
    pedidosFiltrados = pedidosFiltrados.filter(([c, p]) => p.status !== "histórico");
  }

  const lista = pedidosFiltrados.filter(([c, p]) => {
    // Nunca filtrar pedidos confirmados enquanto tempoExpiracao não foi atingido
    if (p.status === "confirmado" && p.tempoExpiracao) {
      const agora = Date.now();
      if (agora < p.tempoExpiracao) {
        return true; // Mostrar sempre enquanto não expirou
      }
    }
    // Não mostrar pedidos marcados como ocultos
    return !p.oculto;
  });

  // ===== AGENDAR TIMERS PARA PEDIDOS NÃO ENCONTRADOS =====
  pedidosFiltrados.forEach(([c, p]) => {
    if (p.naoEncontradoEm && p.tempoDesapareceNaoEncontrado) {

      const agora = Date.now();
      if (agora < p.tempoDesapareceNaoEncontrado) {
        // Agendar remoção se ainda não está agendado
        if (!pedidoTimeoutsNaoEncontrado[c]) {
          agendarRemocaoPedidoNaoEncontrado(c, p.tempoDesapareceNaoEncontrado, p.naoEncontradoEm);
        }
      }
    }

  if (modoTV) {

    // Título Confirmados
    const tituloConf = document.createElement("div");
    tituloConf.className = "tv-title";
    tituloConf.textContent = "Pedidos Confirmados";

    // 2 colunas para separação
    const colSep1 = document.createElement("div");
    colSep1.className = "tv-col";
    const colSep2 = document.createElement("div");
    colSep2.className = "tv-col";

    // 2 colunas para confirmados
    const colConf1 = document.createElement("div");
    colConf1.className = "tv-col";
    const colConf2 = document.createElement("div");
    colConf2.className = "tv-col";

    // Separar pedidos
    const pedidosSep = [];
    const pedidosConf = [];

    lista.forEach(([c, p]) => {
      const d = document.createElement("div");
      d.className = "card " + p.status;
      d.id = `card-${c}`;
      d.innerHTML = c; // Apenas o número do pedido
      
      if (p.status === "separacao") {
        pedidosSep.push(d);
      } else {
        pedidosConf.push(d);
      }
    });

    // Distribuir em colunas alternadas
    pedidosSep.forEach((card, i) => {
      if (i % 2 === 0) {
        colSep1.appendChild(card);
      } else {
        colSep2.appendChild(card);
      }
    });

    pedidosConf.forEach((card, i) => {
      if (i % 2 === 0) {
        colConf1.appendChild(card);
      } else {
        colConf2.appendChild(card);
      }
    });

    grid.appendChild(tituloSep);
    grid.appendChild(tituloConf);
    grid.appendChild(colSep1);
    grid.appendChild(colSep2);
    grid.appendChild(colConf1);
    grid.appendChild(colConf2);
    cards.appendChild(grid);
  } else {
    lista.forEach(([c, p]) => {
      const statusTexto = p.status === "confirmado" ? "Confirmado" : p.status === "histórico" ? "Histórico" : "Em separação";
      const d = document.createElement("div");
      d.className = "card " + p.status;
      d.id = `card-${c}`;
      
      // Aplicar estilo de "não encontrado" se aplicável
      if (p.naoEncontradoEm && p.tempoDesapareceNaoEncontrado) {
        const agora = Date.now();
        if (agora < p.tempoDesapareceNaoEncontrado) {
          d.style.background = "#C0392B";
          d.style.color = "#fff";
          d.style.opacity = "0.6";
          d.style.borderLeft = "4px solid #A93226";
        }
      }
      
      // Header com número do pedido
      const header = document.createElement("div");
      header.className = "card-header";
      header.textContent = `Pedido: ${c}`;
      
      // Detalhes
      const details = document.createElement("div");
      details.className = "card-details";
      details.innerHTML = `
        <div class="status-text">Status: ${statusTexto}</div>
        ${p.status === "histórico" ? `<div class="info-operador">Tipo: ${p.tipo === "n1" ? "Térreo" : "1º Andar"}</div>` : ""}
        ${p.status === "histórico" ? `<div class="info-operador">Operador: ${p.operador}</div>` : ""}
        ${p.iniciou ? `<div class="info-operador">Térreo — Iniciou: ${p.iniciou}</div>` : ""}
        ${p.finalizou ? `<div class="info-operador">Térreo — Finalizou: ${p.finalizou}</div>` : ""}
        ${p.andar2 ? `

          ${p.andar2.finalizou ? `<div class="info-operador">1º Andar — Finalizou: ${p.andar2.finalizou}</div>` : ""}
        ` : ""}
        ${p.status === "confirmado" && p.tempoExpiracao ? `<div class="timer" id="timer-${c}"></div>` : ""}
        ${p.naoEncontradoEm && p.tempoDesapareceNaoEncontrado ? `<div class="timer" id="timer-nao-encontrado-${c}" style="color: #fff; font-weight: bold;"></div>` : ""}
      `;
      
      // Botões de ação

      `;
      
      d.appendChild(header);
      d.appendChild(details);
      d.appendChild(actions);
      cards.appendChild(d);
    });
  }
}

// ===== AGENDAR REMOÇÃO DE PEDIDOS EXPIRADOS =====
// Mapear para rastrear timeouts ativos
const pedidoTimeouts = {};
const pedidoTimeoutsNaoEncontrado = {};

function agendarRemocaoPedidoNaoEncontrado(codigo, tempoDesaparece, agoraServidor = null) {
  // Se já existe um timeout para este pedido, cancela
  if (pedidoTimeoutsNaoEncontrado[codigo]) {
    clearTimeout(pedidoTimeoutsNaoEncontrado[codigo]);
  }
  
  // Usar timestamp do servidor como referência
  const agoraCliente = Date.now();
  const agoraRef = agoraServidor !== null ? agoraServidor : agoraCliente;
  
  // Calcular o tempo até desaparecimento
  let tempoAteDesaparece = tempoDesaparece - agoraRef;
  
  if (Math.abs(tempoAteDesaparece - (tempoDesaparece - agoraCliente)) > 5000) {
    tempoAteDesaparece = tempoDesaparece - agoraCliente;
    console.warn(`Offset de fuso horário detectado. Usando timestamp do cliente.`);
  }
  
  if (tempoAteDesaparece <= 0) {
    // Já expirou, remove imediatamente
    removerPedidoNaoEncontrado(codigo);
    return;
  }
  
  // Agendar remoção
  pedidoTimeoutsNaoEncontrado[codigo] = setTimeout(() => {
    removerPedidoNaoEncontrado(codigo);
  }, tempoAteDesaparece);
  
  console.log(`Agendada remoção de ${codigo} em ${tempoAteDesaparece}ms`);
}

async function removerPedidoNaoEncontrado(codigo) {
  console.log(`Removendo pedido não encontrado: ${codigo}`);
  
  // Marcar como oculto no Firebase
  await setDoc(doc(db, "pedidosAtivos", codigo), {
    oculto: true
  }, { merge: true });
  
  // Limpar timeout
  if (pedidoTimeoutsNaoEncontrado[codigo]) {
    clearTimeout(pedidoTimeoutsNaoEncontrado[codigo]);
    delete pedidoTimeoutsNaoEncontrado[codigo];
  }
}

function agendarRemocaoPedido(codigo, tempoExpiracao, agoraServidor = null) {
  // Se já existe um timeout para este pedido, cancela
  if (pedidoTimeouts[codigo]) {
    clearTimeout(pedidoTimeouts[codigo]);
  }
  
  // Usar timestamp do servidor como referência para evitar discrepâncias de fuso horário
  const agoraCliente = Date.now();
  const agoraRef = agoraServidor !== null ? agoraServidor : agoraCliente;
  
  // Calcular o tempo até expiração usando o timestamp de referência
  let tempoAteExpiracao = tempoExpiracao - agoraRef;
  
  // Se a diferença for muito grande, recalcular usando o cliente (sincronização falhou)
  if (Math.abs(tempoAteExpiracao - (tempoExpiracao - agoraCliente)) > 5000) {
    tempoAteExpiracao = tempoExpiracao - agoraCliente;
    console.warn(`Offset de fuso horário detectado. Usando timestamp do cliente.`);
  }
  
  if (tempoAteExpiracao <= 0) {
    // Já expirou, remove imediatamente
    removerPedidoVencido(codigo);
    return;
  }
  
  // Agenda remoção exatamente quando expira
  pedidoTimeouts[codigo] = setTimeout(() => {
    removerPedidoVencido(codigo);
    delete pedidoTimeouts[codigo];
  }, tempoAteExpiracao);
  
  console.log(`Pedido ${codigo} agendado para remoção em ${tempoAteExpiracao}ms (${Math.floor(tempoAteExpiracao / 1000)}s)`);
}

function removerPedidoVencido(codigo) {
  // Marca como oculto em vez de deletar do Firebase
  // Assim mantém no histórico e ranking mas sai da tela
  setDoc(doc(db, "pedidosAtivos", codigo), {
    oculto: true
  }, { merge: true })
    .then(() => {
      console.log(`Pedido ${codigo} marcado como oculto (expirou)`);
      render();
    })
    .catch(err => console.error(`Erro ao ocultar pedido ${codigo}:`, err));
}

// ===== ATUALIZAR TIMER VISUALMENTE =====
function atualizarTimerVisual() {
  const agora = Date.now();
  Object.entries(pedidos).forEach(([c, p]) => {
    // Timer para pedidos confirmados
    if (p.status === "confirmado" && p.tempoExpiracao) {
      const tempoRestante = p.tempoExpiracao - agora;
      
      if (tempoRestante > 0) {
        const minutos = Math.floor(tempoRestante / 60000);
        const segundos = Math.floor((tempoRestante % 60000) / 1000);
        const timerEl = document.getElementById(`timer-${c}`);
        
        if (timerEl) {
          timerEl.innerText = `Tempo restante: ${minutos}m ${segundos}s`;
        }
      }
    }
    
    // Timer para pedidos não encontrados
    if (p.naoEncontradoEm && p.tempoDesapareceNaoEncontrado) {
      const tempoRestante = p.tempoDesapareceNaoEncontrado - agora;
      
      if (tempoRestante > 0) {
        const minutos = Math.floor(tempoRestante / 60000);
        const segundos = Math.floor((tempoRestante % 60000) / 1000);
        const timerEl = document.getElementById(`timer-nao-encontrado-${c}`);
        
        if (timerEl) {
          timerEl.innerText = `⏱️ Desaparece em: ${minutos}m ${segundos}s`;
        }
      }
    }
  });
}

<script>
// Funções globais acessíveis do HTML
window.abrirAndar = function() {
  document.getElementById("modalAndar").style.display = "flex";
}
window.fecharAndar = function() {
  document.getElementById("modalAndar").style.display = "none";
}
window.abrirHistorico = function() {
  if (prompt("Senha:") !== "1617") return;
  document.getElementById("modalHistorico").style.display = "flex";
  window.renderHistorico();
}
window.fecharHistorico = function() {
  document.getElementById("modalHistorico").style.display = "none";
}
window.limparRelatorio = function() {
  if (prompt("Senha:") === "1617") {
    fetch(window.location.origin + "/api/relatorio", {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ senha: "1617" })
    }).then(() => window.renderHistorico());
  }
}
window.apagarPedido = function(c) {
  if (confirm("Apagar pedido " + c + "?")) {
    // Será executado pela função no módulo
    const event = new CustomEvent("apagarPedido", { detail: c });
    document.dispatchEvent(event);
  }
}
window.limparPedidos = function() {
  if (prompt("Senha:") === "1617") {
    fetch(window.location.origin + "/api/pedidos-limpar", {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ senha: "1617" })
    }).then(() => window.render());
  }
}
window.toggleTV = function() {
  document.body.classList.toggle("modo-tv");
  window.render();
}
window.abrirRanked = function() {
  if(prompt("Senha:")!=="1617") return;
  console.log("Dados de ranking:", { ranked: window.ranked, historicoRanked: window.historicoRanked });
  document.getElementById("modalRanked").style.display="flex";
  window.renderRanked();
}
window.fecharRanked = function() {
  document.getElementById("modalRanked").style.display="none";
}
window.limparRanked = function() {
  if(prompt("Senha:")!=="1617") {
    return;
  }
  ranked={ n1:{}, n2:{} };
  limparRankingFirestore();
  window.renderRanked();
}
window.listarRank = function(obj){
  let html="<div class='ranked-box'>";
  const lista=Object.entries(obj)
    .filter(([nome]) => nome && nome !== "undefined" && nome !== "null") // Filtrar nomes vazios/undefined
    .sort((a,b)=>b[1]-a[1]);
  lista.forEach(([nome,pontos])=> html+=`${usuarios[nome] || nome}: ${pontos}<br>`);
  html+="</div>";
  return html;
}
window.renderRanked = function(){
  const box=document.getElementById("rankedAtual");
  const hist=document.getElementById("rankedHistorico");

  const n1 = (window.ranked && window.ranked.n1) || {};
  const n2 = (window.ranked && window.ranked.n2) || {};

  box.innerHTML=`
    <h3>Mês Atual — Térreo</h3>
    ${window.listarRank(n1)}
    <h3>Mês Atual — 1º Andar</h3>
    ${window.listarRank(n2)}
  `;

  hist.innerHTML="<h3>Histórico Mensal</h3>";

  if (window.historicoRanked && window.historicoRanked.length > 0) {
    window.historicoRanked.forEach(reg=>{
      const rankingN1 = (reg.ranking && reg.ranking.n1) || {};
      const rankingN2 = (reg.ranking && reg.ranking.n2) || {};
      
      hist.innerHTML+=`
        <div class="ranked-box">
          <strong>${reg.mes}</strong><br><br>
          <u>Térreo</u><br>${window.listarRank(rankingN1)}
          <u>1º Andar</u><br>${window.listarRank(rankingN2)}
        </div>
      `;
    });
  } else {
    hist.innerHTML += "<p>Sem histórico ainda</p>";
  }
}

// ===== EFEITO SONORO =====
let lastSoundTime = 0;
const soundDebounce = 300; // 300ms de intervalo mínimo entre sons

const audioSound = new Audio('recording-20260301-111943_rYCiiIkl.mp3');
function playSound() {
  const now = Date.now();
  if (now - lastSoundTime >= soundDebounce) {
    lastSoundTime = now;
    audioSound.currentTime = 0;
    audioSound.play().catch(err => console.log("Áudio não pode ser reproduzido:", err));
  }
}
</script>
